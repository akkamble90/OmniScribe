name: OmniScribe CI
on: [push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install Linux system dependencies for Magic and Tesseract
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1 tesseract-ocr

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Inject Secrets to prevent Groq/HuggingFace errors
      - name: Verify Architecture
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "import agents.graph; import utils.vector_db; print('Structure Validated!')"

      # Added Docker Build Step
      - name: Build Docker Image
        run: |
          docker build -t omniscribe:latest .